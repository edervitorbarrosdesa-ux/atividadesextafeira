<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato</title>
</head>
<body>
  <h1>Página de Contato</h1>
  <form>
    <label>Nome:</label>
    <input type="text" name="nome"><br><br>
    
    <label>Email:</label>
    <input type="email" name="email"><br><br>
    
    <label>Mensagem:</label>
    <textarea name="mensagem"></textarea><br><br>
    
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
